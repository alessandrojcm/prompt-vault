openapi: 3.1.0
info:
  title: Prompt Vault API
  version: 0.1.0
  description: Shared contract for the Prompt Vault auth slice.
servers:
  - url: /
paths:
  /api/signup:
    post:
      tags:
        - Auth
      operationId: signup
      summary: Sign up a new normal user
      description: Creates an enabled normal user from public signup data.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignupRequest'
      responses:
        '201':
          description: User created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSummary'
        '400':
          description: Validation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
  /api/login:
    post:
      tags:
        - Auth
      operationId: login
      summary: Log in with username and password
      description: Authenticates a user and establishes a session cookie.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login succeeded and the response includes the current user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSummary'
        '401':
          description: Invalid credentials.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthenticationErrorResponse'
        '403':
          description: Account is disabled.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthenticationErrorResponse'
  /api/logout:
    post:
      tags:
        - Auth
      operationId: logout
      summary: Log out the current user
      description: Invalidates the authenticated user's server session.
      responses:
        '204':
          description: Logout succeeded and the session was invalidated.
        '401':
          description: No authenticated session is present.
  /api/user:
    get:
      tags:
        - CurrentUser
      operationId: getCurrentUser
      summary: Get the current user session
      description: Returns the current user when a session is present.
      responses:
        '200':
          description: An authenticated session exists.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSummary'
        '401':
          description: No authenticated session is present.
  /api/admin/users:
    get:
      tags:
        - AdminUsers
      operationId: listAdminUsers
      summary: List registered users for admin user management
      description: Returns registered users for administrators, optionally filtered by role.
      parameters:
        - name: role
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/UserRole'
      responses:
        '200':
          description: Registered users matching the optional role filter.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserSummary'
        '400':
          description: Validation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '401':
          description: No authenticated session is present.
        '403':
          description: The authenticated user is not an administrator.
  /api/admin/users/{userId}/status:
    patch:
      tags:
        - AdminUsers
      operationId: updateAdminUserStatus
      summary: Set a normal user's account status
      description: Updates the desired account status for a normal user. The operation is idempotent.
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminUserStatusUpdateRequest'
      responses:
        '200':
          description: The user with the requested account status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSummary'
        '400':
          description: Validation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '401':
          description: No authenticated session is present.
        '403':
          description: The target cannot be managed by this operation.
        '404':
          description: The target user does not exist.
components:
  schemas:
    LoginRequest:
      type: object
      additionalProperties: false
      required:
        - username
        - password
      properties:
        username:
          type: string
          minLength: 1
          maxLength: 30
          description: Usernames are trimmed and matched case-insensitively.
        password:
          type: string
          minLength: 1
          maxLength: 255
          description: Passwords preserve spaces exactly as entered.
    SignupRequest:
      type: object
      additionalProperties: false
      required:
        - username
        - emailAddress
        - password
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 30
          description: Usernames are trimmed before validation and persistence.
        emailAddress:
          type: string
          minLength: 1
          maxLength: 255
          description: Email addresses are trimmed before validation and persistence.
          format: email
        password:
          type: string
          minLength: 8
          maxLength: 255
          description: Passwords preserve spaces exactly as entered.
    UserRole:
      type: string
      enum:
        - ADMIN
        - USER
    AccountStatus:
      type: string
      enum:
        - ENABLED
        - DISABLED
    AdminUserStatusUpdateRequest:
      type: object
      additionalProperties: false
      required:
        - accountStatus
      properties:
        accountStatus:
          $ref: '#/components/schemas/AccountStatus'
    UserSummary:
      type: object
      additionalProperties: false
      required:
        - id
        - username
        - emailAddress
        - role
        - accountStatus
      properties:
        id:
          type: integer
          format: int64
        username:
          type: string
        emailAddress:
          type: string
          format: email
        role:
          $ref: '#/components/schemas/UserRole'
        accountStatus:
          $ref: '#/components/schemas/AccountStatus'
    ValidationFieldError:
      type: object
      additionalProperties: false
      required:
        - field
        - message
      properties:
        field:
          type: string
        message:
          type: string
    ValidationErrorResponse:
      type: object
      additionalProperties: false
      required:
        - message
        - fieldErrors
      properties:
        message:
          type: string
        fieldErrors:
          type: array
          items:
            $ref: '#/components/schemas/ValidationFieldError'
    AuthenticationErrorResponse:
      type: object
      additionalProperties: false
      required:
        - message
      properties:
        message:
          type: string
