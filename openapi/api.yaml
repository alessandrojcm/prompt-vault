openapi: 3.1.0
info:
  title: Prompt Vault API
  version: 0.1.0
  description: Shared contract for the Prompt Vault auth slice.
servers:
  - url: /
paths:
  /api/signup:
    post:
      tags:
        - Auth
      operationId: signup
      summary: Sign up a new normal user
      description: Creates an enabled normal user from public signup data.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignupRequest'
      responses:
        '201':
          description: User created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSummary'
        '400':
          description: Validation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
  /api/login:
    post:
      tags:
        - Auth
      operationId: login
      summary: Log in with username and password
      description: Authenticates a user and establishes a session cookie.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login succeeded and the response includes the current user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSummary'
        '401':
          description: Invalid credentials.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthenticationErrorResponse'
        '403':
          description: Account is disabled.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthenticationErrorResponse'
  /api/logout:
    post:
      tags:
        - Auth
      operationId: logout
      summary: Log out the current user
      description: Invalidates the authenticated user's server session.
      responses:
        '204':
          description: Logout succeeded and the session was invalidated.
        '401':
          description: No authenticated session is present.
  /api/user:
    get:
      tags:
        - CurrentUser
      operationId: getCurrentUser
      summary: Get the current user session
      description: Returns the current user when a session is present.
      responses:
        '200':
          description: An authenticated session exists.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSummary'
        '401':
          description: No authenticated session is present.
  /api/prompt/categories:
    get:
      tags:
        - PromptCategories
      operationId: listPromptCategories
      summary: List prompt categories
      description: Returns the predefined system-wide prompt category catalog.
      responses:
        '200':
          description: Prompt categories available to authenticated users.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PromptCategory'
        '401':
          description: No authenticated session is present.
    post:
      tags:
        - PromptCategories
      operationId: createPromptCategory
      summary: Create a prompt category
      description: Creates a system-wide prompt category. Admin users only.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePromptCategoryRequest'
      responses:
        '201':
          description: Prompt category created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PromptCategory'
        '400':
          description: Validation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '401':
          description: No authenticated session is present.
        '403':
          description: The authenticated user is not an administrator.
  /api/prompt/categories/{categoryId}:
    patch:
      tags:
        - PromptCategories
      operationId: updatePromptCategory
      summary: Rename a prompt category
      description: Renames an existing system-wide prompt category. Admin users only.
      parameters:
        - name: categoryId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePromptCategoryRequest'
      responses:
        '200':
          description: Prompt category renamed successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PromptCategory'
        '400':
          description: Validation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '401':
          description: No authenticated session is present.
        '403':
          description: The authenticated user is not an administrator.
        '404':
          description: Prompt category was not found.
    delete:
      tags:
        - PromptCategories
      operationId: deletePromptCategory
      summary: Delete a prompt category
      description: Deletes an existing system-wide prompt category when no Prompts reference it. Admin users only.
      parameters:
        - name: categoryId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Prompt category deleted successfully.
        '401':
          description: No authenticated session is present.
        '403':
          description: The authenticated user is not an administrator.
        '404':
          description: Prompt category was not found.
        '409':
          description: Prompt category is still referenced by one or more prompts.
  /api/prompts:
    post:
      tags:
        - Prompts
      operationId: createPrompt
      summary: Create a private prompt
      description: Creates a private prompt owned by the current authenticated user.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePromptRequest'
      responses:
        '201':
          description: Prompt created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Prompt'
        '400':
          description: Validation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '401':
          description: No authenticated session is present.
  /api/public-prompts:
    get:
      tags:
        - Prompts
      operationId: listPublicPrompts
      summary: List public prompts
      description: Returns public prompts owned by other enabled users.
      responses:
        '200':
          description: Public prompts visible to the current authenticated user.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PublicPrompt'
        '401':
          description: No authenticated session is present.
  /api/public-prompts/{promptId}:
    get:
      tags:
        - Prompts
      operationId: getPublicPrompt
      summary: Get public prompt detail
      description: Returns public prompt detail when the prompt is owned by another enabled user.
      parameters:
        - name: promptId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Public prompt detail visible to the current authenticated user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicPrompt'
        '401':
          description: No authenticated session is present.
        '404':
          description: The prompt is not visible as a public prompt to the current user.
  /api/prompts/{promptId}:
    get:
      tags:
        - Prompts
      operationId: getPrompt
      summary: Get an owned prompt
      description: Returns prompt detail when the prompt is owned by the current authenticated user.
      parameters:
        - name: promptId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Prompt detail for the current owner.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Prompt'
        '401':
          description: No authenticated session is present.
        '404':
          description: The prompt does not exist for the current owner.
    patch:
      tags:
        - Prompts
      operationId: updatePrompt
      summary: Update an owned prompt
      description: Updates prompt content and category when the prompt is owned by the current authenticated user.
      parameters:
        - name: promptId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePromptRequest'
      responses:
        '200':
          description: The updated prompt.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Prompt'
        '400':
          description: Validation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '401':
          description: No authenticated session is present.
        '404':
          description: The prompt does not exist for the current owner.
    delete:
      tags:
        - Prompts
      operationId: deletePrompt
      summary: Delete an owned prompt
      description: Permanently deletes a prompt when it is owned by the current authenticated user.
      parameters:
        - name: promptId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Prompt deleted successfully.
        '401':
          description: No authenticated session is present.
        '404':
          description: The prompt does not exist for the current owner.
  /api/prompts/{promptId}/visibility:
    patch:
      tags:
        - Prompts
      operationId: updatePromptVisibility
      summary: Share or unshare an owned prompt
      description: Updates Prompt Visibility when the prompt is owned by the current authenticated user.
      parameters:
        - name: promptId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePromptVisibilityRequest'
      responses:
        '200':
          description: The prompt with the requested visibility.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Prompt'
        '400':
          description: Validation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '401':
          description: No authenticated session is present.
        '404':
          description: The prompt does not exist for the current owner.
  /api/users/{userId}/prompts:
    get:
      tags:
        - Prompts
      operationId: listMyPrompts
      summary: List my prompts
      description: Returns all prompts owned by the current authenticated user, including private prompts.
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Prompts owned by the current user.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Prompt'
        '401':
          description: No authenticated session is present.
        '403':
          description: The requested user is not the current authenticated user.
  /api/admin/prompts/flagged:
    get:
      tags:
        - AdminPrompts
      operationId: listAdminFlaggedPrompts
      summary: List currently flagged prompts for administrators
      description: Returns current Prompt Flags with prompt submission metadata and stable matched keyword snapshots. Admin users only.
      responses:
        '200':
          description: Currently flagged prompts visible to administrators.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AdminFlaggedPrompt'
        '401':
          description: No authenticated session is present.
        '403':
          description: The authenticated user is not an administrator.
  /api/admin/users:
    get:
      tags:
        - AdminUsers
      operationId: listAdminUsers
      summary: List registered users for admin user management
      description: Returns registered users for administrators, optionally filtered by role.
      parameters:
        - name: role
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/UserRole'
      responses:
        '200':
          description: Registered users matching the optional role filter.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserSummary'
        '400':
          description: Validation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '401':
          description: No authenticated session is present.
        '403':
          description: The authenticated user is not an administrator.
  /api/admin/users/{userId}/status:
    patch:
      tags:
        - AdminUsers
      operationId: updateAdminUserStatus
      summary: Set a normal user's account status
      description: Updates the desired account status for a normal user. The operation is idempotent.
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminUserStatusUpdateRequest'
      responses:
        '200':
          description: The user with the requested account status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSummary'
        '400':
          description: Validation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '401':
          description: No authenticated session is present.
        '403':
          description: The target cannot be managed by this operation.
        '404':
          description: The target user does not exist.
  /api/admin/policy/keywords:
    get:
      tags:
        - AdminPolicyKeywords
      operationId: listPolicyKeywords
      summary: List Policy Keywords
      description: Returns the Policy Keyword catalog for administrators.
      responses:
        '200':
          description: Policy Keywords available for administration.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PolicyKeyword'
        '401':
          description: No authenticated session is present.
        '403':
          description: The authenticated user is not an administrator.
    post:
      tags:
        - AdminPolicyKeywords
      operationId: createPolicyKeyword
      summary: Create a Policy Keyword
      description: Creates a globally managed Policy Keyword. Admin users only.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PolicyKeywordRequest'
      responses:
        '201':
          description: Policy Keyword created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PolicyKeyword'
        '400':
          description: Validation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '401':
          description: No authenticated session is present.
        '403':
          description: The authenticated user is not an administrator.
  /api/admin/policy/keywords/{keywordId}:
    patch:
      tags:
        - AdminPolicyKeywords
      operationId: updatePolicyKeyword
      summary: Update a Policy Keyword
      description: Updates an existing globally managed Policy Keyword. Admin users only.
      parameters:
        - name: keywordId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PolicyKeywordRequest'
      responses:
        '200':
          description: Policy Keyword updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PolicyKeyword'
        '400':
          description: Validation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '401':
          description: No authenticated session is present.
        '403':
          description: The authenticated user is not an administrator.
        '404':
          description: Policy Keyword was not found.
    delete:
      tags:
        - AdminPolicyKeywords
      operationId: deletePolicyKeyword
      summary: Delete a Policy Keyword
      description: Deletes an existing globally managed Policy Keyword. Admin users only.
      parameters:
        - name: keywordId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Policy Keyword deleted successfully.
        '401':
          description: No authenticated session is present.
        '403':
          description: The authenticated user is not an administrator.
        '404':
          description: Policy Keyword was not found.
components:
  schemas:
    LoginRequest:
      type: object
      additionalProperties: false
      required:
        - username
        - password
      properties:
        username:
          type: string
          minLength: 1
          maxLength: 30
          description: Usernames are trimmed and matched case-insensitively.
        password:
          type: string
          minLength: 1
          maxLength: 255
          description: Passwords preserve spaces exactly as entered.
    SignupRequest:
      type: object
      additionalProperties: false
      required:
        - username
        - emailAddress
        - password
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 30
          description: Usernames are trimmed before validation and persistence.
        emailAddress:
          type: string
          minLength: 1
          maxLength: 255
          description: Email addresses are trimmed before validation and persistence.
          format: email
        password:
          type: string
          minLength: 8
          maxLength: 255
          description: Passwords preserve spaces exactly as entered.
    UserRole:
      type: string
      enum:
        - ADMIN
        - USER
    AccountStatus:
      type: string
      enum:
        - ENABLED
        - DISABLED
    AdminUserStatusUpdateRequest:
      type: object
      additionalProperties: false
      required:
        - accountStatus
      properties:
        accountStatus:
          $ref: '#/components/schemas/AccountStatus'
    UserSummary:
      type: object
      additionalProperties: false
      required:
        - id
        - username
        - emailAddress
        - role
        - accountStatus
      properties:
        id:
          type: integer
          format: int64
        username:
          type: string
        emailAddress:
          type: string
          format: email
        role:
          $ref: '#/components/schemas/UserRole'
        accountStatus:
          $ref: '#/components/schemas/AccountStatus'
    PromptCategory:
      type: object
      additionalProperties: false
      required:
        - id
        - label
        - slug
        - createdAt
        - createdByUserId
        - updatedAt
      properties:
        id:
          type: integer
          format: int64
        label:
          type: string
        slug:
          type: string
          description: Stable snake_case category identifier.
        createdAt:
          type: string
          format: date-time
        createdByUserId:
          type: integer
          format: int64
        updatedAt:
          type: string
          format: date-time
    PolicyKeyword:
      type: object
      additionalProperties: false
      required:
        - id
        - keyword
        - createdAt
        - createdByUserId
        - createdByUsername
        - updatedAt
      properties:
        id:
          type: integer
          format: int64
        keyword:
          type: string
        createdAt:
          type: string
          format: date-time
        createdByUserId:
          type: integer
          format: int64
        createdByUsername:
          type: string
          description: Username of the Admin who created the Policy Keyword.
        updatedAt:
          type: string
          format: date-time
    PolicyKeywordRequest:
      type: object
      additionalProperties: false
      required:
        - keyword
      properties:
        keyword:
          type: string
          minLength: 1
          maxLength: 100
          description: Policy Keyword text is edge-trimmed before validation and persistence while preserving internal whitespace and punctuation.
    CreatePromptCategoryRequest:
      type: object
      additionalProperties: false
      required:
        - label
      properties:
        label:
          type: string
          minLength: 1
          maxLength: 100
          description: Prompt Category labels are edge-trimmed before validation and persistence while preserving internal whitespace and punctuation.
    UpdatePromptCategoryRequest:
      type: object
      additionalProperties: false
      required:
        - label
      properties:
        label:
          type: string
          minLength: 1
          maxLength: 100
          description: Prompt Category labels are edge-trimmed before validation and persistence while preserving internal whitespace and punctuation.
    PromptVisibility:
      type: string
      enum:
        - PRIVATE
        - PUBLIC
    CreatePromptRequest:
      type: object
      additionalProperties: false
      required:
        - title
        - text
        - categoryId
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 120
          description: Prompt titles are trimmed before validation and persistence.
        text:
          type: string
          minLength: 1
          maxLength: 10000
          description: Prompt text is edge-trimmed before validation and persistence while preserving internal whitespace and newlines.
        categoryId:
          type: integer
          format: int64
          minimum: 1
        visibility:
          type: string
          default: PRIVATE
          enum:
            - PUBLIC
            - PRIVATE
    UpdatePromptRequest:
      type: object
      additionalProperties: false
      required:
        - title
        - text
        - categoryId
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 120
          description: Prompt titles are trimmed before validation and persistence.
        text:
          type: string
          minLength: 1
          maxLength: 10000
          description: Prompt text is edge-trimmed before validation and persistence while preserving internal whitespace and newlines.
        categoryId:
          type: integer
          format: int64
          minimum: 1
    UpdatePromptVisibilityRequest:
      type: object
      additionalProperties: false
      required:
        - visibility
      properties:
        visibility:
          $ref: '#/components/schemas/PromptVisibility'
    Prompt:
      type: object
      additionalProperties: false
      required:
        - id
        - title
        - text
        - visibility
        - categoryId
        - ownerUserId
        - createdAt
        - updatedAt
      properties:
        id:
          type: integer
          format: int64
        title:
          type: string
        text:
          type: string
        visibility:
          $ref: '#/components/schemas/PromptVisibility'
        categoryId:
          type: integer
          format: int64
        ownerUserId:
          type: integer
          format: int64
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        flaggedAt:
          type: string
          format: date-time
          description: Present when the Prompt was flagged by Policy Keyword matching. Matched keyword snapshots are not exposed in owner-facing responses.
    PublicPrompt:
      type: object
      additionalProperties: false
      required:
        - id
        - title
        - text
        - visibility
        - categoryId
        - ownerUsername
        - createdAt
        - updatedAt
      properties:
        id:
          type: integer
          format: int64
        title:
          type: string
        text:
          type: string
        visibility:
          $ref: '#/components/schemas/PromptVisibility'
        categoryId:
          type: integer
          format: int64
        ownerUsername:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    AdminFlaggedPrompt:
      type: object
      additionalProperties: false
      required:
        - id
        - title
        - ownerUsername
        - categoryLabel
        - matchedKeywordSnapshots
        - submittedAt
      properties:
        id:
          type: integer
          format: int64
        title:
          type: string
        ownerUsername:
          type: string
        categoryLabel:
          type: string
        matchedKeywordSnapshots:
          type: array
          items:
            type: string
        submittedAt:
          type: string
          format: date-time
          description: The Prompt creation date, used as the date of submission.
    ValidationFieldError:
      type: object
      additionalProperties: false
      required:
        - field
        - message
      properties:
        field:
          type: string
        message:
          type: string
    ValidationErrorResponse:
      type: object
      additionalProperties: false
      required:
        - message
        - fieldErrors
      properties:
        message:
          type: string
        fieldErrors:
          type: array
          items:
            $ref: '#/components/schemas/ValidationFieldError'
    AuthenticationErrorResponse:
      type: object
      additionalProperties: false
      required:
        - message
      properties:
        message:
          type: string
