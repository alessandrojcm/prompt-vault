services:
  mysql:
    image: mysql:9.7
    environment:
      MYSQL_DATABASE: prompt_vault
      MYSQL_USER: prompt_vault
      MYSQL_PASSWORD: prompt_vault
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uprompt_vault -pprompt_vault"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    volumes:
      - mysql-data:/var/lib/mysql

volumes:
  mysql-data:
